<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<h2>掲示板アプリ</h2>
<form th:action="@{/article/insert-article}" method="post" style="padding-bottom: 10px; border-bottom: 1px solid black">
    <div>
        <label>
            投稿者名
        </label>
        <input type="text" name="name"/>
    </div>
    <div>
        <label>
            投稿者名
        </label>
        <textarea rows="5" cols="7" name="content">
       </textarea>
    </div>
    <button>記事投稿</button>
</form>
<div style="padding-bottom: 10px; border-bottom: 1px solid black" th:each=" article : ${application.articleList}">
    <p>投稿者名: <span th:text="${article.name}">dummy</span></p>
    <p>投稿内容</p>
    <p th:text="${article.content}">dummy</p>
    <ul>
        <li th:each="comment : ${article.commentList}">
            <span th:text="${comment.name}">コメント者</span> :
            <span th:text="${comment.content}">コメント内容</span>
        </li>
    </ul>
</div>
</body>
</html>
